spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mercury_auth_new?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    # Standalone mode configuration
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:#{null}}  # Password for Redis master/slaves
    
    # Sentinel mode configuration (automatically enabled when REDIS_SENTINEL_MASTER is set)
    # When sentinel configuration is provided, standalone mode is ignored
    sentinel:
      master: ${REDIS_SENTINEL_MASTER:#{null}}  # Sentinel master name
      nodes: ${REDIS_SENTINEL_NODES:#{null}}  # Format: host1:port1,host2:port2,host3:port3
      password: ${REDIS_SENTINEL_PASSWORD:#{null}}  # Password for Sentinel nodes (if authentication enabled)
  mail:
    from: "no-reply@example.com"
    host: smtp.example.com
    port: 25
    username: user
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false

# SMS Configuration (optional)
# Configure either Aliyun or Tencent Cloud SMS provider
# Only one provider needs to be configured
# IMPORTANT: Use environment variables for sensitive credentials in production
sms:
  # Alibaba Cloud (Aliyun) SMS Configuration
  aliyun:
    enabled: ${SMS_ALIYUN_ENABLED:false}  # Set to true to enable Aliyun SMS
    access-key-id: ${SMS_ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ALIYUN_ACCESS_KEY_SECRET:}
    sign-name: ${SMS_ALIYUN_SIGN_NAME:}  # SMS signature
    template-code: ${SMS_ALIYUN_TEMPLATE_CODE:}  # SMS template code
    region-id: ${SMS_ALIYUN_REGION_ID:cn-hangzhou}  # Region ID (default: cn-hangzhou)
  
  # Tencent Cloud SMS Configuration
  tencent:
    enabled: ${SMS_TENCENT_ENABLED:false}  # Set to true to enable Tencent SMS
    secret-id: ${SMS_TENCENT_SECRET_ID:}
    secret-key: ${SMS_TENCENT_SECRET_KEY:}
    sdk-app-id: ${SMS_TENCENT_SDK_APP_ID:}  # SMS SDK App ID
    sign-name: ${SMS_TENCENT_SIGN_NAME:}  # SMS signature
    template-id: ${SMS_TENCENT_TEMPLATE_ID:}  # SMS template ID
    region: ${SMS_TENCENT_REGION:ap-guangzhou}  # Region (default: ap-guangzhou)

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    secret: ${JWT_SECRET}
    ttl-seconds: 7200
  token-cache:
    # Token cache configuration for performance optimization
    max-size: ${TOKEN_CACHE_MAX_SIZE:10000}  # Maximum number of tokens to cache
    expire-after-write-seconds: ${TOKEN_CACHE_EXPIRE_SECONDS:600}  # Cache expiry time (10 minutes)
  tenant-cache:
    # Tenant cache configuration with independent TTL for ultra-high traffic scenarios
    # Longer TTL reduces database queries for tenant validation
    max-size: ${TENANT_CACHE_MAX_SIZE:1000}  # Maximum number of tenants to cache
    expire-after-write-seconds: ${TENANT_CACHE_EXPIRE_SECONDS:1800}  # Cache expiry time (30 minutes)
  code:
    ttl-minutes: 10
    phone-ttl-minutes: 5
    # OTP protection settings
    cooldown-seconds: ${CODE_COOLDOWN_SECONDS:60}  # Minimum time between code requests
    max-daily-requests: ${CODE_MAX_DAILY_REQUESTS:20}  # Maximum code requests per day per identifier
    max-verify-attempts: ${CODE_MAX_VERIFY_ATTEMPTS:5}  # Maximum verification attempts before lockout
  rate-limit:
    # Rate limiting configuration for various auth operations
    # Default settings (backward compatibility)
    max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:10}
    window-minutes: ${RATE_LIMIT_WINDOW_MINUTES:1}
    
    # IP-based rate limiting for additional protection against distributed attacks
    ip:
      max-attempts: ${RATE_LIMIT_IP_MAX_ATTEMPTS:50}  # Higher limit for IP-based rate limiting
      window-minutes: ${RATE_LIMIT_IP_WINDOW_MINUTES:1}
    
    # Auto-blacklist settings for failed login attempts
    # This is INDEPENDENT from rate limiting and provides longer-term protection
    auto-blacklist:
      enabled: ${AUTO_BLACKLIST_ENABLED:true}  # Enable/disable auto-blacklist feature
      failure-threshold: ${AUTO_BLACKLIST_FAILURE_THRESHOLD:20}  # Number of failures to trigger blacklist
      failure-window-minutes: ${AUTO_BLACKLIST_FAILURE_WINDOW_MINUTES:5}  # Time window to count failures
      blacklist-duration-minutes: ${AUTO_BLACKLIST_DURATION_MINUTES:30}  # Duration of blacklist
      severe-failure-threshold: ${AUTO_BLACKLIST_SEVERE_FAILURE_THRESHOLD:50}  # Severe violation threshold
      severe-failure-window-minutes: ${AUTO_BLACKLIST_SEVERE_FAILURE_WINDOW_MINUTES:10}  # Severe violation time window
      severe-blacklist-duration-minutes: ${AUTO_BLACKLIST_SEVERE_DURATION_MINUTES:120}  # Severe violation blacklist duration
    
    # Verification code sending - more restrictive to prevent abuse
    # Applies to: RATE_LIMIT_SEND_EMAIL_CODE, RATE_LIMIT_SEND_PHONE_CODE
    send-code:
      max-attempts: ${RATE_LIMIT_SEND_CODE_MAX_ATTEMPTS:5}   # More restrictive: 5 code requests per minute
      window-minutes: ${RATE_LIMIT_SEND_CODE_WINDOW_MINUTES:1}
    
    # Login operations - balanced limits
    # Applies to: RATE_LIMIT_LOGIN_PASSWORD, RATE_LIMIT_LOGIN_EMAIL, RATE_LIMIT_LOGIN_PHONE
    login:
      max-attempts: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:10}  # Standard login attempts
      window-minutes: ${RATE_LIMIT_LOGIN_WINDOW_MINUTES:1}
    
    # Captcha generation - more permissive since users need multiple captchas
    # Applies to: CAPTCHA_LOGIN_PASSWORD, CAPTCHA_LOGIN_EMAIL, CAPTCHA_LOGIN_PHONE
    captcha:
      max-attempts: ${RATE_LIMIT_CAPTCHA_MAX_ATTEMPTS:20}  # Higher limit: users may need multiple captcha images
      window-minutes: ${RATE_LIMIT_CAPTCHA_WINDOW_MINUTES:1}
    
    # Token refresh operations
    # Applies to: RATE_LIMIT_REFRESH_TOKEN
    refresh-token:
      max-attempts: ${RATE_LIMIT_REFRESH_TOKEN_MAX_ATTEMPTS:10}
      window-minutes: ${RATE_LIMIT_REFRESH_TOKEN_WINDOW_MINUTES:1}
    
    # Daily registration limits per tenant/IP
    # Limits the number of new user registrations from the same IP per tenant per day
    # This prevents abuse and mass account creation
    daily-registration:
      enabled: ${DAILY_REGISTRATION_ENABLED:true}  # Enable/disable daily registration limit
      max-registrations-per-day: ${DAILY_REGISTRATION_MAX_PER_DAY:10}  # Maximum registrations per IP per tenant per day
  
  # User count cache configuration
  # Redis-based caching for tenant user counts with auto-recovery
  user-count-cache:
    enabled: ${USER_COUNT_CACHE_ENABLED:true}  # Enable/disable Redis caching for user counts
    ttl-hours: ${USER_COUNT_CACHE_TTL_HOURS:24}  # Cache TTL (time to live) in hours
    validation-threshold-minutes: ${USER_COUNT_CACHE_VALIDATION_THRESHOLD_MINUTES:60}  # Re-sync from DB if counter older than this
  
  blacklist:
    # Blacklist configuration - INDEPENDENT from rate limiting
    # Blacklist provides persistent blocking while rate limiting provides temporary throttling
    ip-enabled: ${BLACKLIST_IP_ENABLED:true}  # Enable/disable IP blacklist checking
    token-enabled: ${BLACKLIST_TOKEN_ENABLED:true}  # Enable/disable token blacklist checking
    permanent-blacklist-cache-days: ${BLACKLIST_PERMANENT_CACHE_DAYS:365}  # Cache duration for permanent blacklists
  captcha:
    threshold: 3
    ttl-minutes: 5

# Swagger/OpenAPI configuration - DISABLED in production for security
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.mercury.auth: INFO
    org.springframework: WARN
    org.springframework.security: WARN

# SECURITY NOTE: Never commit secrets to version control
# Set JWT_SECRET, DB_PASSWORD, MAIL_PASSWORD, etc. via environment variables
# For production deployment, use secrets management (e.g., Kubernetes Secrets, AWS Secrets Manager)
