spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mercury_auth_new?useSSL=false&serverTimezone=UTC
    username: root
    # Set DB_PASSWORD if your test database requires authentication
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    # Standalone mode configuration
    host: localhost
    port: 6379
    database: 0
    
    # Sentinel mode configuration (uncomment to enable)
    # When sentinel configuration is provided, standalone mode is ignored
    # sentinel:
    #   master: mymaster  # The master name configured in sentinel
    #   nodes: sentinel1:26379,sentinel2:26379,sentinel3:26379  # Comma-separated list of sentinel nodes
  mail:
    from: "no-reply@example.com"
    host: smtp.example.com
    port: 25
    username: user
    # Set MAIL_PASSWORD if mail sending is enabled during tests
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false

# SMS Configuration (optional)
# Configure either Aliyun or Tencent Cloud SMS provider
# Only one provider needs to be configured
sms:
  # Alibaba Cloud (Aliyun) SMS Configuration
  aliyun:
    enabled: false  # Set to true to enable Aliyun SMS
    access-key-id: your-aliyun-access-key-id
    access-key-secret: your-aliyun-access-key-secret
    sign-name: your-sign-name  # SMS signature
    template-code: SMS_123456789  # SMS template code
    region-id: cn-hangzhou  # Region ID (default: cn-hangzhou)
  
  # Tencent Cloud SMS Configuration
  tencent:
    enabled: false  # Set to true to enable Tencent SMS
    secret-id: your-tencent-secret-id
    secret-key: your-tencent-secret-key
    sdk-app-id: your-sdk-app-id  # SMS SDK App ID
    sign-name: your-sign-name  # SMS signature
    template-id: "123456"  # SMS template ID
    region: ap-guangzhou  # Region (default: ap-guangzhou)

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    # Two UUIDs (~72 chars with hyphens) exceed the 32-byte minimum for HS256
    secret: ${JWT_SECRET:${random.uuid}${random.uuid}}
    ttl-seconds: 7200
  token-cache:
    max-size: 10000
    expire-after-write-seconds: 600  # Cache expiry time (10 minutes)
  tenant-cache:
    # Tenant cache configuration with independent TTL for ultra-high traffic scenarios
    # Longer TTL reduces database queries for tenant validation
    max-size: 1000  # Maximum number of tenants to cache
    expire-after-write-seconds: 1800  # Cache expiry time (30 minutes)
  code:
    ttl-minutes: 10
    phone-ttl-minutes: 5
    # OTP protection settings
    cooldown-seconds: 60  # Minimum time between code requests
    max-daily-requests: 20  # Maximum code requests per day per identifier
    max-verify-attempts: 5  # Maximum verification attempts before lockout
  rate-limit:
    # Rate limiting configuration for various auth operations
    # max-attempts: Maximum number of requests allowed within the window
    # window-minutes: Time window in minutes for rate limiting
    max-attempts: 10
    window-minutes: 1
    ip:
      max-attempts: 50
      window-minutes: 1
    auto-blacklist:
      enabled: true
      failure-threshold: 20
      failure-window-minutes: 5
      blacklist-duration-minutes: 30
      severe-failure-threshold: 50
      severe-failure-window-minutes: 10
      severe-blacklist-duration-minutes: 120
    send-code:
      max-attempts: 5
      window-minutes: 1
    login:
      max-attempts: 10
      window-minutes: 1
    captcha:
      max-attempts: 20
      window-minutes: 1
    refresh-token:
      max-attempts: 10
      window-minutes: 1
    
    # Daily registration limits per tenant/IP
    # Limits the number of new user registrations from the same IP per tenant per day
    # This prevents abuse and mass account creation
    daily-registration:
      enabled: true  # Enable/disable daily registration limit
      max-registrations-per-day: 10  # Maximum registrations per IP per tenant per day
  
  # User count cache configuration
  # Redis-based caching for tenant user counts with auto-recovery
  user-count-cache:
    enabled: true  # Enable/disable Redis caching for user counts
    ttl-hours: 24  # Cache TTL (time to live) in hours
    validation-threshold-minutes: 60  # Re-sync from DB if counter older than this
  
  blacklist:
    ip-enabled: true
    token-enabled: true
    permanent-blacklist-cache-days: 365
  captcha:
    threshold: 3
    ttl-minutes: 5

# Swagger/OpenAPI configuration
springdoc:
  api-docs:
    enabled: true  # Enable in test for integration testing
  swagger-ui:
    enabled: true  # Enable in test for integration testing

logging:
  level:
    com.mercury.auth: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO

# Profiles are defined in application-dev.yml, application-test.yml, application-prod.yml
