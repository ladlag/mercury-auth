# Mercury Auth 自动黑名单配置示例
# Auto-Blacklist Configuration Example

spring:
  application:
    name: mercury-auth
    
security:
  # JWT Configuration
  # IMPORTANT: Change the secret key in production!
  # 重要：生产环境必须修改密钥！
  jwt:
    secret: ${JWT_SECRET}  # Must be set via environment variable
    ttl-minutes: 1440  # 24 hours
  
  # Rate Limiting Configuration
  rate-limit:
    # Default rate limits (backward compatibility)
    max-attempts: 10
    window-minutes: 1
    
    # IP-based rate limiting
    ip:
      max-attempts: 50
      window-minutes: 1
    
    # Auto-Blacklist Configuration (NEW!)
    # 自动黑名单配置（新功能！）
    auto-blacklist:
      # Enable/disable auto-blacklist feature
      # 启用/禁用自动黑名单功能
      enabled: true
      
      # Normal violation threshold
      # 普通违规阈值
      failure-threshold: 20              # Number of failures to trigger blacklist
      failure-window-minutes: 5          # Time window to count failures (minutes)
      blacklist-duration-minutes: 30     # Blacklist duration (minutes)
      
      # Severe violation threshold (longer blacklist)
      # 严重违规阈值（更长的封禁时间）
      severe-failure-threshold: 50       # Number of failures for severe blacklist
      severe-failure-window-minutes: 10  # Time window for severe violations (minutes)
      severe-blacklist-duration-minutes: 120  # Severe blacklist duration (minutes, 2 hours)
    
    # Operation-specific rate limits
    send-code:
      max-attempts: 5
      window-minutes: 1
    
    login:
      max-attempts: 10
      window-minutes: 1
    
    captcha:
      max-attempts: 20
      window-minutes: 1
    
    refresh-token:
      max-attempts: 10
      window-minutes: 1
  
  # Captcha Configuration
  captcha:
    threshold: 3           # Show captcha after 3 failed attempts
    ttl-minutes: 5        # Captcha validity period
    length: 4             # Captcha question complexity

# Redis Configuration
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: 0

# SMS Configuration (optional)
# Configure either Aliyun or Tencent Cloud SMS provider
# Only one provider needs to be configured
sms:
  # Alibaba Cloud (Aliyun) SMS Configuration
  aliyun:
    enabled: false  # Set to true to enable Aliyun SMS
    access-key-id: ${SMS_ALIYUN_ACCESS_KEY_ID:your-aliyun-access-key-id}
    access-key-secret: ${SMS_ALIYUN_ACCESS_KEY_SECRET:your-aliyun-access-key-secret}
    sign-name: ${SMS_ALIYUN_SIGN_NAME:your-sign-name}  # SMS signature
    template-code: ${SMS_ALIYUN_TEMPLATE_CODE:SMS_123456789}  # SMS template code
    region-id: ${SMS_ALIYUN_REGION_ID:cn-hangzhou}  # Region ID (default: cn-hangzhou)
  
  # Tencent Cloud SMS Configuration
  tencent:
    enabled: false  # Set to true to enable Tencent SMS
    secret-id: ${SMS_TENCENT_SECRET_ID:your-tencent-secret-id}
    secret-key: ${SMS_TENCENT_SECRET_KEY:your-tencent-secret-key}
    sdk-app-id: ${SMS_TENCENT_SDK_APP_ID:your-sdk-app-id}  # SMS SDK App ID
    sign-name: ${SMS_TENCENT_SIGN_NAME:your-sign-name}  # SMS signature
    template-id: ${SMS_TENCENT_TEMPLATE_ID:123456}  # SMS template ID
    region: ${SMS_TENCENT_REGION:ap-guangzhou}  # Region (default: ap-guangzhou)
  
# Database Configuration
datasource:
  url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mercury_auth}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
  username: ${DB_USERNAME:root}
  password: ${DB_PASSWORD:}

# Example: Adjust thresholds for different security levels
# 示例：根据不同安全级别调整阈值

